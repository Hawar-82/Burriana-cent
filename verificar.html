<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificar Boleto — El Milagro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Outfit:wght@300;400;500;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0;padding:0;box-sizing:border-box }
:root {
  --bg:#02040c; --surface:rgba(6,14,28,0.9);
  --cyan:#00d4ff; --purple:#b44fff;
  --green:#00ff96; --red:#ff4466;
  --text:#f0f8ff; --text2:#90b8d8; --text3:#3a6080;
  --border:rgba(0,212,255,0.2);
}
body {
  font-family:'Outfit',sans-serif; min-height:100vh;
  background:#02040c; color:var(--text);
  display:flex; align-items:center; justify-content:center;
  padding:1.5rem;
  background-image:
    radial-gradient(ellipse at 20% 50%,rgba(0,100,200,0.15) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 20%,rgba(120,0,200,0.12) 0%,transparent 50%);
}
.card {
  width:100%; max-width:420px;
  background:rgba(4,10,24,0.85);
  border:1px solid var(--border);
  border-radius:20px; padding:2.5rem 2rem;
  backdrop-filter:blur(30px);
  box-shadow:0 0 0 1px rgba(0,212,255,0.06),0 25px 80px rgba(0,0,0,0.7),inset 0 1px 0 rgba(0,212,255,0.15);
  text-align:center;
  position:relative; overflow:hidden;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent);
}
.brand {
  font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800;
  background:linear-gradient(135deg,#00d4ff,#b44fff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:.25rem;
}
.subtitle { color:var(--text3); font-size:.85rem; margin-bottom:2rem }

/* Loading */
.loader {
  width:48px; height:48px; border:3px solid rgba(0,212,255,0.2);
  border-top-color:var(--cyan); border-radius:50%;
  animation:spin .8s linear infinite; margin:1rem auto;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* Result */
.result { display:none; animation:fadeIn .4s ease }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.result-icon { font-size:4rem; margin-bottom:1rem }
.result-title {
  font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800;
  margin-bottom:1.5rem;
}
.result-title.ok { color:var(--green) }
.result-title.err { color:var(--red) }

.info-card {
  background:rgba(0,212,255,0.05);
  border:1px solid rgba(0,212,255,0.15);
  border-radius:12px; padding:1.25rem;
  text-align:left; margin-bottom:1rem;
}
.info-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:.4rem 0; border-bottom:1px solid rgba(255,255,255,0.06);
  font-size:.88rem;
}
.info-row:last-child { border-bottom:none }
.info-label { color:var(--text3); font-size:.72rem; text-transform:uppercase; letter-spacing:.08em }
.info-value { color:var(--text); font-weight:600 }
.num-badge {
  font-family:'Playfair Display',serif; font-size:2.5rem; font-weight:900;
  color:#7a1a2a; background:white; border-radius:12px;
  padding:.3rem 1.5rem; display:inline-block; margin:1rem 0;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.estado-badge {
  display:inline-flex; align-items:center; gap:.4rem;
  padding:.35rem .9rem; border-radius:20px; font-size:.82rem; font-weight:600;
}
.estado-pagado { background:rgba(0,255,150,0.12); color:var(--green); border:1px solid rgba(0,255,150,0.3) }
.estado-pendiente { background:rgba(255,68,102,0.1); color:var(--red); border:1px solid rgba(255,68,102,0.2) }
.estado-abonado { background:rgba(0,212,255,0.1); color:var(--cyan); border:1px solid rgba(0,212,255,0.2) }

.btn-back {
  margin-top:1rem; padding:.7rem 1.5rem;
  background:rgba(0,212,255,0.08); border:1px solid var(--border);
  color:var(--cyan); border-radius:10px; font-family:'Outfit',sans-serif;
  font-size:.9rem; font-weight:600; cursor:pointer; text-decoration:none;
  display:inline-block; transition:.2s;
}
.btn-back:hover { background:rgba(0,212,255,0.15) }

.error-box {
  background:rgba(255,68,102,0.08); border:1px solid rgba(255,68,102,0.2);
  border-radius:12px; padding:1.25rem; margin-bottom:1rem;
  color:var(--red); font-size:.9rem; line-height:1.6;
}
</style>
</head>
<body>
<div class="card">
  <div class="brand">El Milagro</div>
  <div class="subtitle">Verificación de boleto</div>

  <div id="loading">
    <div class="loader"></div>
    <p style="color:var(--text3);font-size:.85rem">Verificando autenticidad...</p>
  </div>

  <div class="result" id="result-ok">
    <div class="result-icon">✅</div>
    <div class="result-title ok">Boleto Auténtico</div>
    <div class="num-badge" id="res-num">0000</div>
    <div class="info-card">
      <div class="info-row">
        <span class="info-label">Titular</span>
        <span class="info-value" id="res-name">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Colaborador</span>
        <span class="info-value" id="res-seller">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Estado</span>
        <span class="info-value" id="res-estado">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Fecha registro</span>
        <span class="info-value" id="res-fecha">—</span>
      </div>
    </div>
    <a href="https://hawar-82.github.io/Burriana-cent" class="btn-back">← Volver a la app</a>
  </div>

  <div class="result" id="result-err">
    <div class="result-icon">❌</div>
    <div class="result-title err">Boleto No Válido</div>
    <div class="error-box" id="err-msg">
      Este boleto no pudo ser verificado. Puede ser falso o los datos son incorrectos.
    </div>
    <a href="https://hawar-82.github.io/Burriana-cent" class="btn-back">← Volver a la app</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ksnpmrqdpqjdnqhcfjvl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_CkDbDY89w_YKk8Q7NUC26g_oh-2Sflx';
const SECRET = 'BurrianaMilagro2026#';

async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
}

async function genToken(num) {
  const hash = await sha256(num.padStart(4,'0') + SECRET);
  return hash.substring(0,8);
}

async function verify() {
  const params = new URLSearchParams(window.location.search);
  const num = params.get('n');
  const token = params.get('t');

  if(!num || !token) {
    showError('URL inválida — faltan parámetros de verificación.');
    return;
  }

  // Verify token
  const expectedToken = await genToken(num);
  if(token.toUpperCase() !== expectedToken) {
    showError('El código de verificación no es válido. Este boleto puede ser falso.');
    return;
  }

  // Query Supabase
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/ventas?numero=eq.${num.padStart(4,'0')}&select=*`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });
    const data = await r.json();

    if(!data || data.length === 0) {
      showError('Número #' + num.padStart(4,'0') + ' no encontrado en el sistema. Este boleto puede ser falso.');
      return;
    }

    const e = data[0];
    const numPad = num.padStart(4,'0');

    // Estado
    let estadoHTML;
    if(e.paid) {
      estadoHTML = '<span class="estado-badge estado-pagado">✅ Pagado</span>';
    } else if((e.abonos||0) > 0) {
      estadoHTML = '<span class="estado-badge estado-abonado">💰 Abonado</span>';
    } else {
      estadoHTML = '<span class="estado-badge estado-pendiente">⏳ Pendiente</span>';
    }

    document.getElementById('res-num').textContent = numPad;
    document.getElementById('res-name').textContent = e.buyer || '—';
    document.getElementById('res-seller').textContent = e.seller || '—';
    document.getElementById('res-estado').innerHTML = estadoHTML;
    document.getElementById('res-fecha').textContent = e.fecha || '—';

    document.getElementById('loading').style.display = 'none';
    document.getElementById('result-ok').style.display = 'block';

  } catch(err) {
    showError('Error al conectar con el servidor. Intenta de nuevo.');
  }
}

function showError(msg) {
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('result-err').style.display = 'block';
}

verify();
</script>
</body>
</html>
